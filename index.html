<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poolcare + Supply Co Pool Health Check V12</title>
<style>
:root{
  --navy:#071f3a;
  --blue:#0d8fbd;
  --bg:#f4f8fb;
  --card:#ffffff;
  --line:#d9e4ea;
  --green:#24a85a;
  --yellow:#ffc400;
  --red:#ff3b30;
  --text:#14212b;
  --muted:#647783;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:white;padding:14px 16px;position:sticky;top:0;z-index:10}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{width:92px;height:64px;object-fit:contain;background:white;border-radius:10px;padding:5px}
.brand-title{font-size:19px;font-weight:900}
.brand-sub{font-size:13px;color:#c7d8e2}
main{max-width:860px;margin:0 auto;padding:14px 12px 112px}
.card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.05)}
h1,h2,h3{margin:0 0 12px}
h1{font-size:24px}
h2{font-size:18px;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:8px}
h3{font-size:16px;color:var(--navy)}
label{display:block;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;margin:13px 0 6px}
input,textarea{width:100%;font-size:17px;padding:13px 12px;border:1px solid #c6d4dc;border-radius:14px;background:white}
textarea{min-height:92px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status-row{display:grid;grid-template-columns:1fr 220px;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid #eef3f6}
.status-row:last-child{border-bottom:0}
.status-title{font-size:17px;font-weight:900}
.status-desc{font-size:13px;color:var(--muted);margin-top:2px}
select.status{width:100%;min-height:54px;border-radius:16px;padding:12px;font-size:16px;font-weight:900;-webkit-appearance:menulist;appearance:auto}
.good{color:#126d35;background:#eefaf3;border:2px solid var(--green)}
.yellow{color:#8a6500;background:#fff8d9;border:2px solid var(--yellow)}
.red{color:#b42318;background:#fff0ef;border:2px solid var(--red)}
.overall-card{padding:22px}
.score-card{border:3px solid var(--green);border-radius:22px;padding:22px;background:#eefaf3;margin-bottom:18px}
.score-card.yellow{border-color:var(--yellow);background:#fff8d9}
.score-card.red{border-color:var(--red);background:#fff0ef}
.score-label{font-size:34px;font-weight:950;line-height:1.1}
.score-sub{font-size:15px;color:#526872;margin-top:8px;line-height:1.35}
.rec{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:13px;background:#fbfdfe;font-weight:700;margin-bottom:8px}
.rec input{width:24px;height:24px}
.actions{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;justify-content:center;z-index:20}
button{border:0;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:900}
.primary{background:var(--navy);color:white}
.secondary{background:#e7eef2;color:var(--navy)}

/* Premium generated report V6 */
#report{display:none}
.report-shell{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 10px 35px rgba(0,0,0,.10);border:1px solid var(--line)}
.report-body{padding:26px}
.report-header{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start;padding-bottom:18px;border-bottom:3px solid var(--navy);margin-bottom:20px}
.report-logo{width:180px;max-height:120px;object-fit:contain}
.report-title-block{align-self:end}
.report-title{font-size:32px;font-weight:950;line-height:1.05;color:var(--navy);margin-bottom:8px}
.report-subtitle{font-size:14px;color:var(--muted);font-weight:700}
.report-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 4px}
.meta-card{background:#f7fafc;border:1px solid var(--line);border-radius:14px;padding:12px}
.meta-label{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:900}
.meta-value{font-size:15px;font-weight:850;margin-top:4px;color:var(--text)}
.hero-status{border-radius:20px;padding:20px;margin-bottom:18px;border:3px solid var(--green);background:#eefaf3}
.hero-status.yellow{border-color:var(--yellow);background:#fff8d9}
.hero-status.red{border-color:var(--red);background:#fff0ef}
.hero-label{font-size:30px;font-weight:950;margin-bottom:8px}
.hero-copy{font-size:15px;color:#42545e;line-height:1.45}
.section-title{font-size:20px;font-weight:950;color:var(--navy);margin:22px 0 12px;border:0;padding:0}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-card{border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:14px;padding:12px;background:#fbfdfe}
.action-title{font-weight:900;color:var(--navy);margin-bottom:4px}
.action-priority{font-size:13px;color:var(--muted);font-weight:700}
.findings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.finding-card{border:1px solid var(--line);border-radius:16px;background:#fbfdfe;padding:14px}
.finding-card h3{margin-bottom:8px}
.priority-list{display:grid;gap:8px}
.priority-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}
.priority-dot{font-size:20px}
.priority-name{font-weight:900}
.priority-status{font-size:13px;font-weight:900;color:var(--muted)}
.modern-list{display:grid;gap:8px}
.modern-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:11px;background:white}
.modern-item{font-weight:800}
.badge{display:inline-block;padding:6px 11px;border-radius:99px;font-weight:950;font-size:13px;white-space:nowrap}
.badge.good{background:#e5f8ed;color:#126d35;border:1px solid #bce8ca}
.badge.yellow{background:#fff2c2;color:#8a6500;border:1px solid #f3d56a}
.badge.red{background:#ffe1df;color:#b42318;border:1px solid #f3b0aa}
.next-steps{border-radius:18px;background:#f0f6f9;border:1px solid var(--line);padding:16px}
.report-footer{background:var(--navy);color:white;padding:18px;text-align:center;font-weight:800;margin-top:22px;border-radius:18px}
.small{font-size:13px;color:var(--muted)}
@media(max-width:680px){.actions{flex-wrap:wrap}.actions button{min-width:31%;}
.grid,.report-meta,.action-grid,.findings-grid{grid-template-columns:1fr}
.status-row{grid-template-columns:1fr;gap:7px}
.actions button{flex:1}
.score-label{font-size:30px}
.report-header{grid-template-columns:1fr}
.report-logo{width:170px}
.report-title{font-size:29px}
.modern-row,.priority-row{grid-template-columns:1fr}
}
@media print{
header,#app,.actions{display:none!important}
body{background:white}
main{padding:0;max-width:none}
#report{display:block!important}
.report-shell{box-shadow:none;border:0;border-radius:0}
.card{box-shadow:none;border:0;page-break-inside:avoid}
.hero-status,.action-card,.finding-card,.modern-row,.priority-row,.next-steps,.report-footer{page-break-inside:avoid}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.pdf-exporting header,
.pdf-exporting #app,
.pdf-exporting .actions {
  display: none !important;
}
.pdf-exporting body {
  background: #ffffff !important;
}
.pdf-exporting main {
  max-width: 980px !important;
  padding: 0 !important;
  margin: 0 auto !important;
}
.pdf-exporting #report {
  display: block !important;
}
.pdf-exporting .report-shell {
  box-shadow: none !important;
  border-radius: 0 !important;
}
@media print {
  @page { margin: 12mm; }
  .action-card,.finding-card,.priority-row,.modern-row,.next-steps {
    page-break-inside: avoid !important;
    break-inside: avoid !important;
  }
}
</style>

<script>
const poolItems=[["Water Chemistry","Balance, sanitiser, salt"],["Water Clarity","Visibility, debris, algae"],["Pool Surface","Tiles, coping, plaster"]];
const equipmentItems=[["Chlorinator","Operation, output"],["Cell","Condition, scaling"],["Pump","Performance, noise"],["Filter","Pressure, condition"],["Plumbing & Valves","Leaks, fittings, operation"],["Automation","Controller, sensors"]];
const recItems=["Water Balance Correction","Green Pool Treatment","Regular Pool Service","Chlorinator Replacement","Cell Replacement","Pump Replacement","Filter Service","Filter Media Replacement","Filter Replacement","Leak Investigation","Plumbing Repair","Automation Upgrade","Other"];

function idSafe(s){return s.replace(/[^a-z0-9]/gi,'_').toLowerCase()}
function val(id){const el=document.getElementById(id);return el?el.value:""}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])).replace(/\n/g,"<br>")}
function statusClass(v){if(v.includes("🔴"))return"red";if(v.includes("🟡"))return"yellow";return"good"}

function makeRows(containerId,items,prefix){
let html="";
items.forEach(([name,desc])=>{let id=prefix+"_"+idSafe(name);html+=`<div class="status-row"><div><div class="status-title">${name}</div><div class="status-desc">${desc}</div></div><select class="status good" id="${id}" onchange="colour(this);updateScore();autoRecommendations();"><option>🟢 Good</option><option>🟡 Attention Recommended</option><option>🔴 Attention Required</option></select></div>`});
document.getElementById(containerId).innerHTML=html;
}

function makeRecommendations(){
document.getElementById("recommendations").innerHTML=recItems.map(i=>`<label class="rec"><input type="checkbox" id="rec_${idSafe(i)}"> ${i}</label>`).join("");
}

function colour(sel){sel.classList.remove("good","yellow","red");sel.classList.add(statusClass(sel.value))}

function updateScore(){
let all=[...poolItems.map(([i])=>val("pool_"+idSafe(i))),...equipmentItems.map(([i])=>val("equip_"+idSafe(i)))];
let reds=all.filter(v=>v.includes("🔴")).length;
let yellows=all.filter(v=>v.includes("🟡")).length;
let card=document.getElementById("scoreCard"),label=document.getElementById("scoreLabel");
card.classList.remove("yellow","red");
if(reds>0){card.classList.add("red");label.textContent="🔴 Attention Required"}
else if(yellows>0){card.classList.add("yellow");label.textContent="🟡 Attention Recommended"}
else{label.textContent="🟢 Good"}
}

function tick(n){let el=document.getElementById("rec_"+idSafe(n));if(el)el.checked=true}

function autoRecommendations(){
recItems.forEach(i=>{let el=document.getElementById("rec_"+idSafe(i));if(el)el.checked=false});
if(val("pool_water_chemistry").includes("🟡")||val("pool_water_chemistry").includes("🔴"))tick("Water Balance Correction");
if(val("pool_water_clarity").includes("🔴"))tick("Green Pool Treatment");
if(val("equip_chlorinator").includes("🔴"))tick("Chlorinator Replacement");
if(val("equip_cell").includes("🔴"))tick("Cell Replacement");
if(val("equip_pump").includes("🔴"))tick("Pump Replacement");
if(val("equip_filter").includes("🟡"))tick("Filter Service");
if(val("equip_filter").includes("🔴")){tick("Filter Media Replacement");tick("Filter Replacement");}
if(val("equip_plumbing___valves").includes("🔴"))tick("Plumbing Repair");
if(val("equip_automation").includes("🔴"))tick("Automation Upgrade");
}

function rows(items,prefix){return items.map(([name])=>{let v=val(prefix+"_"+idSafe(name));return `<div class="modern-row"><div class="modern-item">${name}</div><span class="badge ${statusClass(v)}">${esc(v)}</span></div>`}).join("")}

function checkedRecs(){return recItems.filter(i=>{let el=document.getElementById("rec_"+idSafe(i));return el&&el.checked})}

function overallSummary(status){
if(status.includes("🔴")) return "Attention is required. One or more items should be addressed to reduce the chance of breakdowns, poor water quality or further deterioration.";
if(status.includes("🟡")) return "The pool is operating, however some items are recommended for attention to maintain performance and avoid future issues.";
return "The pool is currently presenting well, with no immediate items requiring attention based on this health check.";
}

function priorityItems(){
let list=[];
[...poolItems.map(([i])=>["pool",i]),...equipmentItems.map(([i])=>["equip",i])].forEach(([prefix,name])=>{
let v=val(prefix+"_"+idSafe(name));
if(v.includes("🔴")) list.push(`<div class="priority-row"><div class="priority-dot">🔴</div><div class="priority-name">${name}</div><div class="priority-status">Attention Required</div></div>`);
else if(v.includes("🟡")) list.push(`<div class="priority-row"><div class="priority-dot">🟡</div><div class="priority-name">${name}</div><div class="priority-status">Attention Recommended</div></div>`);
});
return list.join("");
}

function actionPriority(action){
if(["Chlorinator Replacement","Cell Replacement","Pump Replacement","Filter Media Replacement","Filter Replacement","Plumbing Repair","Automation Upgrade"].includes(action)) return "Attention Required";
return "Recommended";
}


function nextStepsHtml(){
let all=[...poolItems.map(([i])=>val("pool_"+idSafe(i))),...equipmentItems.map(([i])=>val("equip_"+idSafe(i)))];
let hasRed=all.some(v=>v.includes("🔴"));
let hasYellow=all.some(v=>v.includes("🟡"));
let steps=[];
if(hasRed) steps.push("<li>Address red items as soon as practical.</li>");
if(hasYellow) steps.push("<li>Monitor yellow items and plan maintenance before peak swimming season.</li>");
if(!hasRed && !hasYellow) steps.push("<li>Continue regular servicing to maintain water quality and equipment life.</li>");
else steps.push("<li>Continue regular servicing to protect water quality and equipment life.</li>");
return "<ul>"+steps.join("")+"</ul>";
}


function actionPlanHtml(){
let actions=checkedRecs();
if(actions.length===0){
 return "<p>Your pool is currently presenting well. Continue regular servicing and routine water testing to maintain water quality and maximise equipment life.</p>";
}
const map={
 "Water Balance Correction":"Rebalance pool water chemistry to optimise sanitiser efficiency and protect equipment.",
 "Green Pool Treatment":"Carry out corrective treatment to restore water clarity and sanitiser effectiveness.",
 "Regular Pool Service":"Continue regular servicing to maintain water quality and equipment performance.",
 "Chlorinator Replacement":"Replace the chlorinator to restore reliable sanitiser production.",
 "Cell Replacement":"Plan for chlorinator cell replacement to maintain reliable chlorine production.",
 "Pump Replacement":"Replace the circulation pump to ensure reliable water movement and filtration.",
 "Filter Service":"Schedule a filter service to restore optimal circulation and filtration performance.",
 "Filter Media Replacement":"Replace filter media to improve filtration efficiency and water clarity.",
 "Filter Replacement":"Replace the filter to restore effective filtration performance.",
 "Leak Investigation":"Investigate the source of the suspected leak and undertake repairs if required.",
 "Plumbing Repair":"Repair plumbing issues identified during the inspection.",
 "Automation Upgrade":"Upgrade automation equipment to improve reliability and control.",
 "Other":"Review additional findings and recommendations contained within this report."
 };
 let items=actions.map(a=>"<li>"+(map[a]||a)+"</li>").join("");
 items += "<li>Continue regular pool servicing to maintain water quality and equipment longevity.</li>";
 return "<ol>"+items+"</ol>";
}

function generateReport(){
updateScore();
let recs=checkedRecs();
let scoreLabel=document.getElementById("scoreLabel").textContent;
let poolNotes=val("poolNotes");
let equipmentNotes=val("equipmentNotes");
let priorities=priorityItems();
let report=document.getElementById("report");

async function downloadPdf(){
  generateReport();

  const reportEl = document.getElementById("report");
  if(!reportEl){
    alert("Report could not be found.");
    return;
  }

  document.body.classList.add("pdf-exporting");

  // Give the browser a moment to apply export styling
  await new Promise(resolve => setTimeout(resolve, 350));

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const canvas = await html2canvas(reportEl, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      scrollY: 0,
      windowWidth: 980
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.95);
    const pageWidth = 210;
    const pageHeight = 297;
    const margin = 10;
    const usableWidth = pageWidth - (margin * 2);
    const imgHeight = (canvas.height * usableWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = margin;

    pdf.addImage(imgData, "JPEG", margin, position, usableWidth, imgHeight);
    heightLeft -= (pageHeight - margin * 2);

    while (heightLeft > 0) {
      pdf.addPage();
      position = margin - (imgHeight - heightLeft);
      pdf.addImage(imgData, "JPEG", margin, position, usableWidth, imgHeight);
      heightLeft -= (pageHeight - margin * 2);
    }

    // Page numbers
    const pageCount = pdf.internal.getNumberOfPages();
    pdf.setFontSize(9);
    pdf.setTextColor(100);
    for (let i = 1; i <= pageCount; i++) {
      pdf.setPage(i);
      pdf.text(`Page ${i} of ${pageCount}`, pageWidth - margin, pageHeight - 5, { align: "right" });
    }

    const customer = (val("customer") || "customer").replace(/[^a-z0-9]/gi, "_").toLowerCase();
    pdf.save(`pool_health_inspection_${customer}.pdf`);
  } catch (err) {
    console.error(err);
    alert("PDF generation failed on this device. Try Chrome/Safari on Mac, or refresh and try again.");
  } finally {
    document.body.classList.remove("pdf-exporting");
  }
}
